name: CI

on:
  pull_request:
    paths:
      - '.github/workflows/CI.yml'
      - 'src/**'
      - 'examples/**'
      - 'acinclude.m4'
      - 'bootstrap.sh'
      - 'CMakeLists.txt'
      - 'config/**'
      - 'configure.ac'
      - 'include/meson.build'
      - 'include/flint/meson.build'
      - 'Makefile.in'
      - 'meson.build'
      - 'meson.options'
      - 'update_meson.py'
  push:
    paths:
      - '.github/workflows/CI.yml'
      - 'src/**'
      - 'examples/**'
      - 'acinclude.m4'
      - 'bootstrap.sh'
      - 'CMakeLists.txt'
      - 'config/**'
      - 'configure.ac'
      - 'include/meson.build'
      - 'include/flint/meson.build'
      - 'Makefile.in'
      - 'meson.build'
      - 'meson.options'
      - 'update_meson.py'

env:
  GLOBAL_MULTIPLIER: 1

concurrency:
  # Group by workflow and ref, and to limit to 1 concurrent job except for main
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.ref != 'refs/heads/main' || github.run_number }}
  # Cancel intermediate builds for pull requests
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}

jobs:
  ubuntu-meson:
    name: Meson, GCC (x0.5)
    runs-on: ubuntu-24.04
    env:
      CC: "gcc"
      TESTCOEFF: "0.5"
    steps:
      - name: "Rescale multiplier"
        run: echo "FLINT_TEST_MULTIPLIER=$(echo "${TESTCOEFF} * ${GLOBAL_MULTIPLIER}" | bc)" >> $GITHUB_ENV
      - uses: actions/checkout@v5
      - name: "Setup"
        run: |
          sudo apt-get install -y libgmp-dev libmpfr-dev meson ninja-build pkg-config
          $CC --version
          meson --version
          ninja --version
      - name: "Generate Meson files"
        run: python3 update_meson.py
      - name: "Configure"
        run: meson setup build -Dtests=enabled
      - name: "Compile"
        run: meson compile -C build
      - name: "Check"
        run: echo "FLINT_TEST_MULTIPLIER = $FLINT_TEST_MULTIPLIER" && meson test -C build --print-errorlogs

  assert-ntl-msolve-nemo:
    name: NTL, msolve and Nemo.jl
    runs-on: ubuntu-24.04
    env:
      CC: "gcc"
      TESTCOEFF: "0.1"
    steps:
      - uses: actions/checkout@v5
      - name: "Setup"
        run: |
          sudo apt-get install -y libgmp-dev libmpfr-dev libntl-dev autoconf libtool-bin meson ninja-build pkg-config
          $CC --version
          make --version
          autoconf --version
          libtool --version
          meson --version
          ninja --version
          julia --version
          echo "MAKE=make -j$(expr $(nproc) + 1) --output-sync=target" >> $GITHUB_ENV
      - name: "Generate Meson files"
        run: python3 update_meson.py
      - name: "Build FLINT for msolve"
        run: |
          meson setup build -Dtests=enabled -Dntl=enabled -Dassert=enabled
          meson compile -C build
          sudo meson install -C build
          sudo ldconfig
      - name: "Test FLINT for msolve"
        run: |
          echo "FLINT_TEST_MULTIPLIER = $FLINT_TEST_MULTIPLIER"
          meson test -C build --print-errorlogs
      - name: "Test msolve"
        run: |
          git clone --depth=1 https://github.com/algebraic-solving/msolve
          cd msolve/ && ./autogen.sh && ./configure && $MAKE && make check
      - name: "Build FLINT for Nemo"
        run: |
          gmp_path=$(julia -e 'include("dev/find_gmp_mpfr.jl"); print(gmp_artifact_dir())')
          mpfr_path=$(julia -e 'include("dev/find_gmp_mpfr.jl"); print(mpfr_artifact_dir())')
          echo "Path to GMP and MPFR: ${gmp_path}, ${mpfr_path}"
          PKG_CONFIG_PATH="${gmp_path}/lib/pkgconfig:${mpfr_path}/lib/pkgconfig" meson setup build-nemo --prefix="$(pwd)/nemo-flint" -Dlibdir=lib -Dtests=disabled
          meson compile -C build-nemo
          meson install -C build-nemo
      - name: "Test Nemo.jl"
        run: |
          git clone --depth 1 https://github.com/Nemocas/Nemo.jl.git
          mkdir -p ~/.julia/artifacts
          echo -e "[e134572f-a0d5-539d-bddf-3cad8db41a82]\nFLINT = \"$(pwd)/nemo-flint\"" > ~/.julia/artifacts/Overrides.toml
          julia -e "import Pkg; Pkg.develop(path=\"./Nemo.jl\"); Pkg.test(\"Nemo\")"

  ubuntu-codecov:
    name: codecov (x10)
    runs-on: ubuntu-24.04
    env:
      CC: "gcc"
      TESTCOEFF: "10"
    steps:
      - name: "Rescale multiplier"
        run: echo "FLINT_TEST_MULTIPLIER=$(echo "${TESTCOEFF} * ${GLOBAL_MULTIPLIER}" | bc)" >> $GITHUB_ENV
      - uses: actions/checkout@v5
      - name: "Setup"
        run: |
          sudo apt-get install -y libgmp-dev libmpfr-dev meson ninja-build pkg-config lcov gcovr
          $CC --version
          meson --version
          ninja --version
          lcov --version
          gcovr --version
          python3 --version
      - name: "Generate Meson files"
        run: python3 update_meson.py
      - name: "Configure"
        run: meson setup build -Dtests=enabled -Davx2=enabled -Db_coverage=true
      - name: "Compile"
        run: meson compile -C build && ldd build/libflint.so
      - name: "Check"
        run: echo "FLINT_TEST_MULTIPLIER = $FLINT_TEST_MULTIPLIER" && meson test -C build --print-errorlogs
      - name: "Check Python"
        run: LD_LIBRARY_PATH=${LD_LIBRARY_PATH}:$(pwd)/build python3 src/python/flint_ctypes.py
      - name: "Gather coverage data"
        run: meson compile -C build coverage
      - name: "Upload coverage data"
        uses: codecov/codecov-action@v5
        if: github.repository == 'flintlib/flint'
        with:
          files: build/meson-logs/coverage.info
          token: ${{ secrets.CODECOV_TOKEN }}

  regression-check:
    name: Regression check
    runs-on: ubuntu-24.04
    env:
      CC: "gcc"
      CFLAGS: "-march=native -std=c11 -Wall -Wextra -Werror"
      MODULES: "build/thread_pool_merged.lo build/thread_support_merged.lo build/ulong_extras_merged.lo build/long_extras_merged.lo build/perm_merged.lo build/double_extras_merged.lo build/d_vec_merged.lo build/d_mat_merged.lo build/mpn_extras_merged.lo build/nmod_merged.lo build/nmod_vec_merged.lo build/nmod_mat_merged.lo build/nmod_poly_merged.lo build/mpn_mod_merged.lo build/fmpz_merged.lo build/fmpz_vec_merged.lo build/fmpz_mat_merged.lo build/fmpz_poly_merged.lo build/fmpz_mod_merged.lo build/fmpz_mod_vec_merged.lo build/fmpz_mod_mat_merged.lo build/fmpz_mod_poly_merged.lo build/fmpq_merged.lo build/fmpq_vec_merged.lo build/fmpq_mat_merged.lo build/fmpq_poly_merged.lo build/fq_merged.lo build/fq_vec_merged.lo build/fq_mat_merged.lo build/fq_poly_merged.lo build/fq_nmod_merged.lo build/fq_nmod_vec_merged.lo build/fq_nmod_mat_merged.lo build/fq_nmod_poly_merged.lo build/fq_zech_merged.lo build/fq_zech_mat_merged.lo build/fq_zech_poly_merged.lo build/fq_default_merged.lo build/fq_default_mat_merged.lo build/fq_default_poly_merged.lo build/fq_embed_merged.lo build/fq_nmod_embed_merged.lo build/fq_zech_embed_merged.lo build/padic_merged.lo build/padic_mat_merged.lo build/padic_poly_merged.lo build/qadic_merged.lo build/nmod_poly_factor_merged.lo build/fmpz_factor_merged.lo build/fmpz_poly_factor_merged.lo build/fmpz_mod_poly_factor_merged.lo build/fq_poly_factor_merged.lo build/fq_nmod_poly_factor_merged.lo build/fq_zech_poly_factor_merged.lo build/fq_default_poly_factor_merged.lo build/nmod_poly_mat_merged.lo build/fmpz_poly_mat_merged.lo build/mpoly_merged.lo build/nmod_mpoly_merged.lo build/fmpz_mpoly_merged.lo build/fmpz_mod_mpoly_merged.lo build/fmpq_mpoly_merged.lo build/fq_nmod_mpoly_merged.lo build/fq_zech_mpoly_merged.lo build/nmod_mpoly_factor_merged.lo build/fmpz_mpoly_factor_merged.lo build/fmpz_mod_mpoly_factor_merged.lo build/fmpq_mpoly_factor_merged.lo build/fq_nmod_mpoly_factor_merged.lo build/fq_zech_mpoly_factor_merged.lo build/fft_merged.lo build/fft_small_merged.lo"
      # Everything until fmpz_poly_q
    steps:
      - uses: actions/checkout@v5
      - name: "Setup"
        run: |
          sudo apt-get install -y libgmp-dev libmpfr-dev autoconf libtool-bin
          $CC --version
          make --version
          autoconf --version
          libtool --version
          echo "MAKE=make -j$(expr $(nproc) + 1) --output-sync=target" >> $GITHUB_ENV
      - name: "Configure"
        run: ./bootstrap.sh && ./configure CC=${CC} CFLAGS="${CFLAGS}" --disable-debug
      - name: "Check regression in a subset of modules"
        run: $MAKE $MODULES

  ubuntu-arm:
    name: Meson, ARM (x0.5)
    runs-on: ubuntu-24.04-arm
    env:
      CC: "gcc"
      TESTCOEFF: "0.5"
    steps:
      - name: "Rescale multiplier"
        run: echo "FLINT_TEST_MULTIPLIER=$(echo "${TESTCOEFF} * ${GLOBAL_MULTIPLIER}" | bc)" >> $GITHUB_ENV
      - uses: actions/checkout@v5
      - name: "Setup"
        run: |
          sudo apt-get install -y libgmp-dev libmpfr-dev meson ninja-build pkg-config
          $CC --version
          meson --version
          ninja --version
      - name: "Generate Meson files"
        run: python3 update_meson.py
      - name: "Configure"
        run: meson setup build -Dtests=enabled
      - name: "Compile"
        run: meson compile -C build
      - name: "Check"
        run: echo "FLINT_TEST_MULTIPLIER = $FLINT_TEST_MULTIPLIER" && meson test -C build --print-errorlogs

  macos-m1:
    name: Meson, M1 (x0.5)
    runs-on: macos-26
    env:
      TESTCOEFF: "0.5"
    steps:
      - name: "Rescale multiplier"
        run: echo "FLINT_TEST_MULTIPLIER=$(echo "${TESTCOEFF} * ${GLOBAL_MULTIPLIER}" | bc)" >> $GITHUB_ENV
      - uses: actions/checkout@v5
      - name: "Setup"
        run: |
          brew install gmp mpfr meson ninja pkg-config llvm
          echo "CC=$(brew --prefix llvm)/bin/clang" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=$(brew --prefix gmp)/lib/pkgconfig:$(brew --prefix mpfr)/lib/pkgconfig" >> $GITHUB_ENV
          $(brew --prefix llvm)/bin/clang --version
          meson --version
          ninja --version
      - name: "Generate Meson files"
        run: python3 update_meson.py
      - name: "Configure"
        run: meson setup build -Dtests=enabled
      - name: "Compile"
        run: meson compile -C build
      - name: "Check"
        run: echo "FLINT_TEST_MULTIPLIER = $FLINT_TEST_MULTIPLIER" && meson test -C build --print-errorlogs

  ubuntu-clang:
    name: ASan, BLAS, examples (x1)
    runs-on: ubuntu-24.04
    env:
      CC: "clang"
      TESTCOEFF: "1"
    steps:
      - name: "Rescale multiplier"
        run: echo "FLINT_TEST_MULTIPLIER=$(echo "${TESTCOEFF} * ${GLOBAL_MULTIPLIER}" | bc)" >> $GITHUB_ENV
      - uses: actions/checkout@v5
      - name: "Setup"
        run: |
          sudo apt-get install -y libgmp-dev libmpfr-dev meson ninja-build pkg-config perl libopenblas-dev
          clang --version
          meson --version
          ninja --version
      - name: "Generate Meson files"
        run: python3 update_meson.py
      - name: "Configure"
        run: meson setup build -Dtests=enabled -Dexamples=enabled -Dblas=enabled -Db_sanitize=address -Db_lundef=false
      - name: "Compile"
        run: meson compile -C build
      - name: "Check"
        env:
          ASAN_OPTIONS: halt_on_error=1:abort_on_error=1:print_summary=1
          UBSAN_OPTIONS: halt_on_error=1:abort_on_error=1:print_summary=1:print_stacktrace=1
        run: echo "FLINT_TEST_MULTIPLIER = $FLINT_TEST_MULTIPLIER" && meson test -C build --print-errorlogs

  mingw64-gcc:
    name: Meson, MinGW (x0.5)
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    env:
      CC: "gcc"
      TESTCOEFF: "0.5"
    steps:
      - uses: actions/checkout@v5
      - name: "Setup MinGW"
        uses: msys2/setup-msys2@v2
        with:
          msystem: mingw64
          update: true
          install: bc mingw-w64-x86_64-gcc mingw-w64-x86_64-gmp mingw-w64-x86_64-mpfr mingw-w64-x86_64-meson mingw-w64-x86_64-ninja mingw-w64-x86_64-pkgconf
      - name: "Rescale multiplier"
        run: echo "FLINT_TEST_MULTIPLIER=$(echo "${TESTCOEFF} * ${GLOBAL_MULTIPLIER}" | bc)" >> $GITHUB_ENV
      - name: "Setup"
        run: |
          gcc --version
          meson --version
          ninja --version
      - name: "Generate Meson files"
        run: python update_meson.py
      - name: "Configure"
        run: meson setup build -Dtests=enabled
      - name: "Compile"
        run: meson compile -C build
      - name: "Check"
        run: echo "FLINT_TEST_MULTIPLIER = $FLINT_TEST_MULTIPLIER" && meson test -C build --print-errorlogs

  msvc:
    name: Meson, MSVC (x0.5)
    runs-on: windows-latest
    env:
      TESTCOEFF: "0.5"
    steps:
      - name: "Rescale multiplier"
        run: |
          $TESTCOEFF = $env:TESTCOEFF * $env:GLOBAL_MULTIPLIER
          echo "FLINT_TEST_MULTIPLIER=$TESTCOEFF" | Out-File -Append -FilePath $env:GITHUB_ENV
      - uses: actions/checkout@v5
      - name: "Cache vcpkg packages"
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}\vcpkg\archives
          key: ${{ runner.os }}-vcpkg-${{ hashFiles('**/vcpkg.json') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-
      - name: "Install vcpkg packages"
        run: vcpkg install gmp mpfr pthreads pkgconf --binarysource="clear;files,${{ runner.temp }}\vcpkg\archives,readwrite"
      - name: "Setup MSVC"
        uses: ilammy/msvc-dev-cmd@v1.13.0
        with:
          arch: x86_64
      - name: "Setup Meson"
        run: |
          python -m pip install meson ninja
          $pkgConfigPath = "C:/vcpkg/installed/x64-windows/lib/pkgconfig"
          echo "PKG_CONFIG=C:\vcpkg\installed\x64-windows\tools\pkgconf\pkgconf.exe" | Out-File -Append -FilePath $env:GITHUB_ENV
          echo "PKG_CONFIG_PATH=$pkgConfigPath" | Out-File -Append -FilePath $env:GITHUB_ENV
          echo "CMAKE_PREFIX_PATH=C:/vcpkg/installed/x64-windows" | Out-File -Append -FilePath $env:GITHUB_ENV
          echo "INCLUDE=C:\vcpkg\installed\x64-windows\include;$env:INCLUDE" | Out-File -Append -FilePath $env:GITHUB_ENV
          echo "LIB=C:\vcpkg\installed\x64-windows\lib;$env:LIB" | Out-File -Append -FilePath $env:GITHUB_ENV
          echo "C:\vcpkg\installed\x64-windows\bin" | Out-File -Append -FilePath $env:GITHUB_PATH
          echo "C:\vcpkg\installed\x64-windows\tools\pkgconf" | Out-File -Append -FilePath $env:GITHUB_PATH
          cl 2>&1 | Select-Object -First 3
          meson --version
          ninja --version
          C:\vcpkg\installed\x64-windows\tools\pkgconf\pkgconf.exe --version
      - name: "Inspect vcpkg pthreads"
        run: |
          Get-ChildItem C:\vcpkg\installed\x64-windows\include -Filter '*pthread*' | Select-Object FullName
          Get-ChildItem C:\vcpkg\installed\x64-windows\lib -Filter '*pthread*' | Select-Object FullName
          Get-ChildItem C:\vcpkg\installed\x64-windows\lib\pkgconfig -Filter '*pthread*' | Select-Object FullName
          Get-ChildItem C:\vcpkg\installed\x64-windows\share -Recurse -Filter '*pthread*' | Select-Object FullName
      - name: "Generate Meson files"
        run: python update_meson.py
      - name: "Configure"
        run: meson setup build -Dtests=enabled
      - name: "Compile"
        run: meson compile -C build
      - name: "Check"
        run: echo "FLINT_TEST_MULTIPLIER = $env:FLINT_TEST_MULTIPLIER"; meson test -C build --print-errorlogs

  alpine-32bit:
    name: Meson, 32-bit, musl, assert (x2.5)
    runs-on: ubuntu-24.04
    env:
      CC: "gcc"
      TESTCOEFF: "2.5"
    defaults:
      run:
        shell: alpine.sh {0}
    steps:
      - uses: actions/checkout@v5
      - name: "Setup latest Alpine Linux"
        uses: jirutka/setup-alpine@v1
        with:
          arch: x86
          branch: edge
          packages: gmp-dev mpfr-dev gcc musl-dev meson ninja pkgconf python3
      - name: "Rescale multiplier"
        run: echo "FLINT_TEST_MULTIPLIER=$(echo "${TESTCOEFF} * ${GLOBAL_MULTIPLIER}" | bc)" >> $GITHUB_ENV
      - name: "Setup"
        run: |
          gcc --version
          meson --version
          ninja --version
          python3 --version
      - name: "Generate Meson files"
        run: python3 update_meson.py
      - name: "Configure"
        run: meson setup build -Dtests=enabled -Dassert=enabled
      - name: "Compile"
        run: meson compile -C build
      - name: "Check"
        run: echo "FLINT_TEST_MULTIPLIER = $FLINT_TEST_MULTIPLIER" && meson test -C build --print-errorlogs
